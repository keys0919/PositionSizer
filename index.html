<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d0d0d">
  <title>비중 계산기</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0d0d0d;
      --surface:      #141414;
      --surface-up:   #1c1c1e;
      --border:       #242424;
      --border-sub:   #1a1a1a;
      --accent:       #c8981e;
      --accent-dim:   #1a1100;
      --accent-line:  #3a2a00;
      --text-1:       #efefef;
      --text-2:       #aaa;
      --text-3:       #666;
      --pos:          #3a9a6a;
      --pos-dim:      #0d1f16;
      --neg:          #c24a4a;
      --neg-dim:      #1f0d0d;
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      font-size: 16px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
      padding-bottom: calc(env(safe-area-inset-bottom) + 24px);
    }

    /* ── 탭 네비게이션 ── */
    .tab-nav {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
      padding-top: env(safe-area-inset-top);
    }

    .tab-btn {
      flex: 1;
      padding: 15px 8px 13px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-3);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: color 0.2s cubic-bezier(0.16, 1, 0.3, 1),
                  border-color 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      -webkit-tap-highlight-color: transparent;
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab-btn:active { opacity: 0.6; }

    /* ── 탭 패널 ── */
    .tab-panel {
      display: none;
      padding: 24px 20px 0;
      animation: fadeIn 0.18s ease-out;
    }

    .tab-panel.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── 입력 필드 ── */
    .field { margin-bottom: 20px; }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-2);
      margin-bottom: 8px;
    }

    .field input[type="text"] {
      width: 100%;
      padding: 13px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-1);
      font-family: inherit;
      font-size: 20px;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .field input[type="text"]:focus {
      border-color: var(--accent-line);
      box-shadow: 0 0 0 3px rgba(200, 152, 30, 0.08);
    }

    .field input[type="text"]::placeholder { color: var(--text-3); }

    /* 단위 버튼 */
    .unit-btns {
      display: flex;
      gap: 6px;
      margin-top: 7px;
    }

    .unit-btn {
      padding: 6px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: #bbb;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .unit-btn:active {
      transform: scale(0.94);
      background: var(--accent-dim);
      border-color: var(--accent-line);
      color: var(--accent);
      transition-duration: 0.08s;
    }

    /* ── 버튼 그룹 ── */
    .btn-group {
      display: flex;
      gap: 7px;
    }

    .btn-group button,
    .toggle-group button {
      flex: 1;
      padding: 12px 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: #bbb;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.18s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .btn-group button:active,
    .toggle-group button:active {
      transform: scale(0.96);
      transition-duration: 0.08s;
    }

    .btn-group button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d0d0d;
      font-weight: 600;
    }

    .toggle-group { display: flex; gap: 7px; }

    .toggle-group button.active {
      background: var(--accent-dim);
      border-color: var(--accent-line);
      color: var(--accent);
    }

    /* ── 구분선 ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px -20px;
    }

    /* ── 진입금 포컬 블록 ── */
    .entry-block {
      padding: 20px 0 18px;
      border-bottom: 1px solid var(--border-sub);
      margin-bottom: 20px;
    }

    .entry-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-2);
      margin-bottom: 6px;
    }

    .entry-amount {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;
      line-height: 1;
    }

    .entry-badge {
      display: inline-block;
      margin-left: 8px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid var(--accent-line);
      border-radius: 4px;
      padding: 2px 6px;
      vertical-align: middle;
      position: relative;
      top: -4px;
    }

    /* ── 차수 계획 ── */
    .plan-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 4px;
    }

    .plan-row {
      display: flex;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-sub);
      position: relative;
      transition: background 0.15s;
    }

    .plan-row:last-child { border-bottom: none; }

    .plan-row.current::before {
      content: '';
      position: absolute;
      left: -20px;
      top: 0; bottom: 0;
      width: 2px;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
    }

    .step-tag {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--text-3);
      width: 34px;
      flex-shrink: 0;
    }

    .plan-row.current .step-tag { color: var(--accent); }

    .plan-amount {
      flex: 1;
      font-size: 17px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;
      color: var(--text-1);
      text-align: right;
    }

    .plan-row.current .plan-amount { color: var(--accent); }

    .plan-pct {
      font-size: 12px;
      color: var(--text-3);
      width: 48px;
      text-align: right;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    /* ── 슬롯 재배분 ── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-3);
      margin: 22px 0 8px;
    }

    .slot-row {
      display: flex;
      align-items: center;
      padding: 11px 0;
      border-bottom: 1px solid var(--border-sub);
    }

    .slot-row:last-child { border-bottom: none; }

    .slot-tag {
      font-size: 13px;
      color: var(--text-2);
      flex-shrink: 0;
      width: 80px;
    }

    .slot-amount {
      flex: 1;
      font-size: 17px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;
      text-align: right;
    }

    .slot-pct {
      font-size: 12px;
      color: var(--text-3);
      width: 48px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── 1슬롯 조정 ── */
    .adjust-row {
      display: flex;
      align-items: center;
      padding: 14px 0;
    }

    .adjust-tag {
      font-size: 13px;
      color: var(--text-2);
      flex: 1;
    }

    .adjust-amount {
      font-size: 20px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;
      letter-spacing: -0.01em;
    }

    .adjust-amount.pos { color: var(--pos); }
    .adjust-amount.neg { color: var(--neg); }
    .adjust-amount.zero { color: var(--text-3); }

    /* ── 탭2 서브 그룹 ── */
    .sub-group {
      border-left: 2px solid var(--border);
      padding-left: 16px;
      margin-left: 2px;
      margin-bottom: 20px;
    }

    .sub-group-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 16px;
    }

    .sub-group .field { margin-bottom: 16px; }
    .sub-group .field:last-child { margin-bottom: 0; }

    /* ── 빈 상태 ── */
    .empty {
      padding: 48px 0 16px;
      text-align: center;
      font-size: 14px;
      color: var(--text-3);
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>

<nav class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('tab1')">1슬롯</button>
  <button class="tab-btn" onclick="switchTab('tab2')">2슬롯</button>
</nav>

<!-- 탭1: 1슬롯 계산 -->
<div id="tab1" class="tab-panel active">
  <div class="field">
    <label>총 투자금 (원)</label>
    <input type="text" id="t1-total" inputmode="numeric" placeholder="0" oninput="onAmtInput(this, calcTab1)">
    <div class="unit-btns">
      <button class="unit-btn" onclick="applyUnit('t1-total', 1000, calcTab1)">000</button>
      <button class="unit-btn" onclick="applyUnit('t1-total', 10000, calcTab1)">만</button>
      <button class="unit-btn" onclick="applyUnit('t1-total', 100000000, calcTab1)">억</button>
      <button class="unit-btn" onclick="clearAmt('t1-total', calcTab1)">C</button>
    </div>
  </div>

  <div class="field">
    <label>현재 차수</label>
    <div class="btn-group">
      <button id="t1-step1" class="active" onclick="setStep1(1)">1차</button>
      <button id="t1-step2" onclick="setStep1(2)">2차</button>
      <button id="t1-step3" onclick="setStep1(3)">3차</button>
    </div>
  </div>

  <div class="field" id="t1-weighted-field" style="display:none">
    <label>가중 진입</label>
    <div class="toggle-group">
      <button id="t1-w0" class="active" onclick="setWeighted(false)">없음</button>
      <button id="t1-w1" onclick="setWeighted(true)">있음 (1차+2차)</button>
    </div>
  </div>

  <div class="divider"></div>
  <div id="t1-result"></div>
</div>

<!-- 탭2: 2슬롯 전환 계산 -->
<div id="tab2" class="tab-panel">
  <div class="field">
    <label>총 투자금 (원)</label>
    <input type="text" id="t2-total" inputmode="numeric" placeholder="0" oninput="onAmtInput(this, calcTab2)">
    <div class="unit-btns">
      <button class="unit-btn" onclick="applyUnit('t2-total', 1000, calcTab2)">000</button>
      <button class="unit-btn" onclick="applyUnit('t2-total', 10000, calcTab2)">만</button>
      <button class="unit-btn" onclick="applyUnit('t2-total', 100000000, calcTab2)">억</button>
      <button class="unit-btn" onclick="clearAmt('t2-total', calcTab2)">C</button>
    </div>
  </div>

  <div class="sub-group">
    <div class="sub-group-label">현재 1슬롯</div>

    <div class="field">
      <label>보유금 (원)</label>
      <input type="text" id="t2-holding" inputmode="numeric" placeholder="0" oninput="onAmtInput(this, calcTab2)">
      <div class="unit-btns">
        <button class="unit-btn" onclick="applyUnit('t2-holding', 1000, calcTab2)">000</button>
        <button class="unit-btn" onclick="applyUnit('t2-holding', 10000, calcTab2)">만</button>
        <button class="unit-btn" onclick="applyUnit('t2-holding', 100000000, calcTab2)">억</button>
        <button class="unit-btn" onclick="clearAmt('t2-holding', calcTab2)">C</button>
      </div>
    </div>

    <div class="field">
      <label>현재 차수</label>
      <div class="btn-group">
        <button id="t2-s1-1" class="active" onclick="setSlot1Step(1)">1차</button>
        <button id="t2-s1-2" onclick="setSlot1Step(2)">2차</button>
        <button id="t2-s1-3" onclick="setSlot1Step(3)">3차</button>
      </div>
    </div>
  </div>

  <div class="field">
    <label>2슬롯 진입 차수</label>
    <div class="btn-group">
      <button id="t2-s2-1" class="active" onclick="setSlot2Step(1)">1차</button>
      <button id="t2-s2-2" onclick="setSlot2Step(2)">2차</button>
      <button id="t2-s2-3" onclick="setSlot2Step(3)">3차</button>
    </div>
  </div>

  <div class="divider"></div>
  <div id="t2-result"></div>
</div>

<script>
  const state = {
    t1: { step: 1, weighted: false },
    t2: { slot1Step: 1, slot2Step: 1 }
  };

  function switchTab(id) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.tab-btn')[id === 'tab1' ? 0 : 1].classList.add('active');
  }

  // ── 입력 유틸 ──────────────────────────────────

  function rawVal(id) {
    const v = document.getElementById(id).value.replace(/,/g, '');
    return parseFloat(v) || 0;
  }

  function onAmtInput(el, recalc) {
    const digits = el.value.replace(/[^0-9]/g, '');
    const n = parseInt(digits, 10);
    const cursor = el.selectionStart;
    const prevLen = el.value.length;
    el.value = isNaN(n) ? '' : n.toLocaleString('ko-KR');
    // 커서 보정 (콤마 삽입으로 밀림 방지)
    const diff = el.value.length - prevLen;
    el.setSelectionRange(cursor + diff, cursor + diff);
    recalc();
  }

  function applyUnit(id, unit, recalc) {
    const el = document.getElementById(id);
    const n = rawVal(id);
    if (n <= 0) return;
    el.value = (n * unit).toLocaleString('ko-KR');
    recalc();
  }

  function clearAmt(id, recalc) {
    document.getElementById(id).value = '';
    recalc();
  }

  function fmt(n) {
    if (!isFinite(n) || n === null) return '—';
    return Math.round(n).toLocaleString('ko-KR') + '원';
  }

  function pct(n) { return n.toFixed(1) + '%'; }

  // ── 탭1 ──────────────────────────────────────────

  function setStep1(n) {
    state.t1.step = n;
    [1, 2, 3].forEach(i => document.getElementById('t1-step' + i).classList.toggle('active', i === n));
    document.getElementById('t1-weighted-field').style.display = n === 2 ? '' : 'none';
    if (n !== 2) setWeighted(false);
    calcTab1();
  }

  function setWeighted(on) {
    state.t1.weighted = on;
    document.getElementById('t1-w0').classList.toggle('active', !on);
    document.getElementById('t1-w1').classList.toggle('active', on);
    calcTab1();
  }

  function calcTab1() {
    const total = rawVal('t1-total');
    const el = document.getElementById('t1-result');

    if (!total || total <= 0) {
      el.innerHTML = '<p class="empty">총 투자금을 입력하세요</p>';
      return;
    }

    const RATIOS = [1 / 5, 3 / 5, 1 / 5];
    const { step, weighted } = state.t1;
    const amounts = RATIOS.map(r => total * r);

    const thisEntry = (weighted && step === 2) ? amounts[0] + amounts[1] : amounts[step - 1];
    const badge = (weighted && step === 2) ? '<span class="entry-badge">가중</span>' : '';

    const rows = [1, 2, 3].map(i => {
      const cur = i === step;
      const tag = (weighted && step === 2 && i === 2) ? '2차*' : `${i}차`;
      return `<div class="plan-row ${cur ? 'current' : ''}">
        <span class="step-tag">${tag}</span>
        <span class="plan-amount">${fmt(amounts[i - 1])}</span>
        <span class="plan-pct">${pct(RATIOS[i - 1] * 100)}</span>
      </div>`;
    }).join('');

    el.innerHTML = `
      <div class="entry-block">
        <div class="entry-label">이번 진입금</div>
        <div class="entry-amount">${fmt(thisEntry)}${badge}</div>
      </div>
      <div class="plan-label">차수 전체 계획</div>
      ${rows}
    `;
  }

  // ── 탭2 ──────────────────────────────────────────

  function setSlot1Step(n) {
    state.t2.slot1Step = n;
    [1, 2, 3].forEach(i => document.getElementById('t2-s1-' + i).classList.toggle('active', i === n));
    calcTab2();
  }

  function setSlot2Step(n) {
    state.t2.slot2Step = n;
    [1, 2, 3].forEach(i => document.getElementById('t2-s2-' + i).classList.toggle('active', i === n));
    calcTab2();
  }

  function calcTab2() {
    const total = rawVal('t2-total');
    const holding = rawVal('t2-holding');
    const el = document.getElementById('t2-result');

    if (!total || total <= 0) {
      el.innerHTML = '<p class="empty">총 투자금을 입력하세요</p>';
      return;
    }

    const S1 = 2 / 3, S2 = 1 / 3;
    const STEPS = [1 / 5, 3 / 5, 1 / 5];

    const slot1Target = total * S1;
    const slot2Target = total * S2;
    const adjust = slot1Target - holding;

    const s2Step = state.t2.slot2Step;
    const s2Entry = slot2Target * STEPS[s2Step - 1];
    const s2Amounts = STEPS.map(r => slot2Target * r);

    const adjClass = adjust > 0 ? 'pos' : adjust < 0 ? 'neg' : 'zero';
    const adjTag = adjust > 0 ? '추가 여지' : adjust < 0 ? '청산 필요' : '조정 없음';

    const s2Rows = [1, 2, 3].map(i => `
      <div class="plan-row ${i === s2Step ? 'current' : ''}">
        <span class="step-tag">${i}차</span>
        <span class="plan-amount">${fmt(s2Amounts[i - 1])}</span>
        <span class="plan-pct">${pct(STEPS[i - 1] * S2 * 100)}</span>
      </div>`).join('');

    el.innerHTML = `
      <div class="section-label">슬롯 재배분 2:1</div>
      <div class="slot-row">
        <span class="slot-tag">1슬롯 목표</span>
        <span class="slot-amount">${fmt(slot1Target)}</span>
        <span class="slot-pct">${pct(S1 * 100)}</span>
      </div>
      <div class="slot-row">
        <span class="slot-tag">2슬롯 목표</span>
        <span class="slot-amount">${fmt(slot2Target)}</span>
        <span class="slot-pct">${pct(S2 * 100)}</span>
      </div>

      <div class="section-label">1슬롯 조정</div>
      <div class="adjust-row">
        <span class="adjust-tag">${adjTag}</span>
        <span class="adjust-amount ${adjClass}">${fmt(Math.abs(adjust))}</span>
      </div>

      <div class="section-label">2슬롯 — 이번 진입금</div>
      <div class="entry-block" style="padding-top:12px">
        <div class="entry-label">${s2Step}차 진입</div>
        <div class="entry-amount">${fmt(s2Entry)}</div>
      </div>

      <div class="plan-label">2슬롯 전체 계획</div>
      ${s2Rows}
    `;
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js');
  }

  setStep1(1);
  calcTab2();
</script>
</body>
</html>
