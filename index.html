<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d0d0d">
  <title>Core 비중 계산기</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --surface-up: #1c1c1e;
      --border: #242424;
      --border-sub: #1a1a1a;
      --accent: #c8981e;
      --accent-dim: #1a1100;
      --accent-line: #3a2a00;
      --text-1: #efefef;
      --text-2: #aaa;
      --text-3: #666;
      --pos: #3a9a6a;
      --pos-dim: #0d1f16;
      --neg: #c24a4a;
      --neg-dim: #1f0d0d;
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      min-height: 100dvh;
      padding: calc(env(safe-area-inset-top) + 24px) 20px calc(env(safe-area-inset-bottom) + 28px);
      background: var(--bg);
      color: var(--text-1);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      font-size: 16px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 22px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1.2;
    }

    .meta {
      margin-top: 7px;
      color: var(--text-3);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .field { margin-bottom: 20px; }

    .field label,
    .section-label,
    .result-label,
    .plan-label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-2);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    input[type="text"] {
      width: 100%;
      padding: 13px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-1);
      font: inherit;
      font-size: 20px;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input[type="text"]:focus {
      border-color: var(--accent-line);
      box-shadow: 0 0 0 3px rgba(200, 152, 30, 0.08);
    }

    input[type="text"]::placeholder { color: var(--text-3); }

    .unit-btns,
    .btn-group {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      min-height: 42px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: #bbb;
      font: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.12s ease, background 0.16s ease, border-color 0.16s ease, color 0.16s ease;
    }

    button:active { transform: scale(0.96); }

    .unit-btn {
      flex: 1;
      padding: 0 12px;
    }

    .btn-group button {
      flex: 1;
      padding: 0 8px;
    }

    .btn-group button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d0d0d;
    }

    .divider {
      height: 1px;
      margin: 24px -20px;
      background: var(--border);
    }

    .result {
      padding: 20px 0 18px;
      border-bottom: 1px solid var(--border-sub);
      margin-bottom: 20px;
    }

    .result-amount {
      color: var(--accent);
      font-size: 36px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;
    }

    .result-amount.pos { color: var(--pos); }
    .result-amount.neg { color: var(--neg); }
    .result-amount.zero { color: var(--text-3); }

    .summary {
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-sub);
    }

    .row:last-child { border-bottom: none; }

    .row-label {
      width: 88px;
      flex-shrink: 0;
      color: var(--text-2);
      font-size: 13px;
    }

    .row-value {
      flex: 1;
      text-align: right;
      font-size: 17px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;
    }

    .row-pct {
      width: 54px;
      flex-shrink: 0;
      color: var(--text-3);
      font-size: 12px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .plan-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-sub);
      position: relative;
    }

    .plan-row:last-child { border-bottom: none; }

    .plan-row.current::before {
      content: "";
      position: absolute;
      left: -20px;
      top: 0;
      bottom: 0;
      width: 2px;
      border-radius: 0 2px 2px 0;
      background: var(--accent);
    }

    .stage-tag {
      width: 54px;
      flex-shrink: 0;
      color: var(--text-3);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .plan-row.current .stage-tag,
    .plan-row.current .row-value {
      color: var(--accent);
    }

    .callout {
      margin-top: 20px;
      padding: 15px 16px;
      border-left: 3px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
    }

    .callout.pos { background: var(--pos-dim); border-left-color: var(--pos); }
    .callout.neg { background: var(--neg-dim); border-left-color: var(--neg); }

    .callout-title {
      color: var(--text-2);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .callout-text {
      color: var(--text-1);
      font-size: 14px;
    }

    .empty {
      padding: 48px 0 16px;
      text-align: center;
      color: var(--text-3);
      font-size: 14px;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Core 비중 계산기</h1>
      <div class="meta">v8-core · 단일 Core</div>
    </header>

    <div class="field">
      <label>총 투자금</label>
      <input type="text" id="total" inputmode="numeric" placeholder="0" oninput="onAmtInput(this, calculate)">
      <div class="unit-btns">
        <button class="unit-btn" onclick="applyUnit('total', 1000, calculate)">000</button>
        <button class="unit-btn" onclick="applyUnit('total', 10000, calculate)">만</button>
        <button class="unit-btn" onclick="applyUnit('total', 100000000, calculate)">억</button>
        <button class="unit-btn" onclick="clearAmt('total', calculate)">C</button>
      </div>
    </div>

    <div class="field">
      <label>현재 Core 보유금</label>
      <input type="text" id="holding" inputmode="numeric" placeholder="0" oninput="onAmtInput(this, calculate)">
      <div class="unit-btns">
        <button class="unit-btn" onclick="applyUnit('holding', 1000, calculate)">000</button>
        <button class="unit-btn" onclick="applyUnit('holding', 10000, calculate)">만</button>
        <button class="unit-btn" onclick="applyUnit('holding', 100000000, calculate)">억</button>
        <button class="unit-btn" onclick="clearAmt('holding', calculate)">C</button>
      </div>
    </div>

    <div class="field">
      <label>목표 단계</label>
      <div class="btn-group">
        <button id="stage1" class="active" onclick="setStage(1)">1차</button>
        <button id="stage2" onclick="setStage(2)">2차 완료</button>
        <button id="stage0" onclick="setStage(0)">전량 EXIT</button>
      </div>
    </div>

    <div class="divider"></div>
    <div id="result"></div>
  </main>

  <script>
    const state = { stage: 1 };

    const TARGETS = {
      0: { label: '전량 EXIT', pct: 0 },
      1: { label: 'Core 1차', pct: 1 / 3 },
      2: { label: 'Core 2차 완료', pct: 1 }
    };

    function rawVal(id) {
      const v = document.getElementById(id).value.replace(/,/g, '');
      return parseFloat(v) || 0;
    }

    function onAmtInput(el, recalc) {
      const prevDigits = (el.dataset.fmt || '').replace(/[^0-9]/g, '');
      const prevLen = (el.dataset.fmt || '').length;
      const curDigits = el.value.replace(/[^0-9]/g, '');
      const curLen = el.value.length;

      let digits = curDigits;
      if (digits === prevDigits && curLen < prevLen) {
        digits = digits.slice(0, -1);
      }

      const formatted = digits === '' ? '' : parseInt(digits, 10).toLocaleString('ko-KR');
      el.value = formatted;
      el.dataset.fmt = formatted;
      recalc();
    }

    function applyUnit(id, unit, recalc) {
      const el = document.getElementById(id);
      const n = rawVal(id);
      if (n <= 0) return;
      const formatted = (n * unit).toLocaleString('ko-KR');
      el.value = formatted;
      el.dataset.fmt = formatted;
      recalc();
    }

    function clearAmt(id, recalc) {
      const el = document.getElementById(id);
      el.value = '';
      el.dataset.fmt = '';
      recalc();
    }

    function fmt(n) {
      if (!isFinite(n) || n === null) return '—';
      return Math.round(n).toLocaleString('ko-KR') + '원';
    }

    function pct(n) {
      return n.toFixed(1) + '%';
    }

    function setStage(stage) {
      state.stage = stage;
      [0, 1, 2].forEach(s => {
        document.getElementById('stage' + s).classList.toggle('active', s === stage);
      });
      calculate();
    }

    function signedAmount(n) {
      if (n > 0) return '+' + fmt(n);
      if (n < 0) return '−' + fmt(Math.abs(n));
      return fmt(0);
    }

    function calculate() {
      const total = rawVal('total');
      const holding = rawVal('holding');
      const el = document.getElementById('result');

      if (!total || total <= 0) {
        el.innerHTML = '<p class="empty">총 투자금을 입력하세요</p>';
        return;
      }

      const target = TARGETS[state.stage];
      const stage1 = total / 3;
      const stage2Add = total * 2 / 3;
      const full = total;
      const targetAmount = total * target.pct;
      const delta = targetAmount - holding;
      const currentPct = total > 0 ? holding / total * 100 : 0;
      const targetPct = target.pct * 100;
      const cashAfterTarget = total - targetAmount;

      const deltaClass = delta > 0 ? 'pos' : delta < 0 ? 'neg' : 'zero';
      const deltaLabel = delta > 0 ? '추가 필요금' : delta < 0 ? '축소 필요금' : '조정 없음';
      const calloutClass = state.stage === 0 ? 'neg' : delta > 0 ? 'pos' : delta < 0 ? 'neg' : '';
      const calloutText = state.stage === 0
        ? 'Core 상실 또는 Exit Signal 확정 시 보유금 전액 종료'
        : state.stage === 1
          ? 'Core 1차 목표는 포트폴리오의 1/3'
          : 'Core 2차 완료 목표는 포트폴리오 100%';

      const rows = [
        { active: state.stage === 1, label: '1차', amount: stage1, pct: 100 / 3 },
        { active: false, label: '2차 추가', amount: stage2Add, pct: 200 / 3 },
        { active: state.stage === 2, label: '2차 완료', amount: full, pct: 100 }
      ].map(row => `
        <div class="plan-row ${row.active ? 'current' : ''}">
          <span class="stage-tag">${row.label}</span>
          <span class="row-value">${fmt(row.amount)}</span>
          <span class="row-pct">${pct(row.pct)}</span>
        </div>
      `).join('');

      el.innerHTML = `
        <div class="result">
          <span class="result-label">${deltaLabel}</span>
          <div class="result-amount ${deltaClass}">${signedAmount(delta)}</div>
        </div>

        <div class="section-label">목표</div>
        <div class="summary">
          <div class="row">
            <span class="row-label">단계</span>
            <span class="row-value">${target.label}</span>
            <span class="row-pct">${pct(targetPct)}</span>
          </div>
          <div class="row">
            <span class="row-label">목표금</span>
            <span class="row-value">${fmt(targetAmount)}</span>
            <span class="row-pct">${pct(targetPct)}</span>
          </div>
          <div class="row">
            <span class="row-label">현재</span>
            <span class="row-value">${fmt(holding)}</span>
            <span class="row-pct">${pct(currentPct)}</span>
          </div>
          <div class="row">
            <span class="row-label">현금</span>
            <span class="row-value">${fmt(cashAfterTarget)}</span>
            <span class="row-pct">${pct(100 - targetPct)}</span>
          </div>
        </div>

        <div class="plan-label">Core 계획</div>
        ${rows}

        <div class="callout ${calloutClass}">
          <div class="callout-title">v8-core</div>
          <div class="callout-text">${calloutText}</div>
        </div>
      `;
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js');
    }

    calculate();
  </script>
</body>
</html>
